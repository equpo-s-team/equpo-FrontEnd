# User uses Firebase Auth UID as the primary key so we can look up / update
# by UID directly without needing a separate UUID query first.
type User @table(key: ["uid"]) {
  uid: String! @default(expr: "auth.uid")
  displayName: String!
  level: Int!
  experiencePoints: Int!
  virtualCurrency: Int!
  lastActive: Timestamp! @default(expr: "request.time")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  photoURL: String
}

type Team @table {
  name: String!
  leader: User!
  virtualCurrency: Int!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  description: String
}

type TeamMembership @table(key: ["user", "team"]) {
  user: User!
  team: Team!
  role: String!
  joinedAt: Timestamp! @default(expr: "request.time")
}

type Task @table {
  dueDate: Timestamp!
  priority: String!
  status: String!
  isRecurring: Boolean
  recurringInterval: String
  recurringCount: Int
  assignedUser: User
  assignedGroup: Group
  teamId: Team!
}

type Group @table {
  groupName: String!
  team: Team!
}

type GroupMembership @table(key: ["user", "group"]) {
  user: User!
  group: Group!
}

type TaskCategory @table(key: ["task"]) {
  task: Task!
  name: String!
}

type Achievement @table {
  name: String!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  description: String
  iconURL: String
}

type UserAchievement @table(key: ["user", "achievement"]) {
  user: User!
  achievement: Achievement!
  unlockedAt: Timestamp! @default(expr: "request.time")
}

type Reward @table {
  name: String!
  cost: Int!
  experienceGranted: Int!
  type: String!
  isTeamReward: Boolean!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  description: String
  iconURL: String
}

type UserReward @table(key: ["user", "reward"]) {
  user: User!
  reward: Reward!
  dateObtained: Timestamp!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  redeemedAt: Timestamp
}

type TeamReward @table(key: ["team", "reward"]) {
  team: Team!
  reward: Reward!
  dateObtained: Timestamp!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
